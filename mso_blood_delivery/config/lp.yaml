# LP solver settings
solver:
  name: CBC
  timeout_s: 60           # seconds per window solve
  msg: 0                  # suppress solver output

# Fleet throughput capacity
fleet:
  C_fleet: 24             # floor(8 drones * 60 min / 20 min avg mission)
  t_avg_mission_min: 20   # approximate average round-trip mission time

# Constraint settings
constraints:
  M_cover: 1              # minimum banks serving each hospital per window
  sentinel_value: -1      # used when LP is infeasible for a window

# Index sizes (for validation)
B: 3                      # number of blood banks
H: 12                     # number of hospitals
T: 24                     # number of time windows
