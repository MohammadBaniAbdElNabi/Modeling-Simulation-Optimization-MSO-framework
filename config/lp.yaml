# LP solver settings
solver:
  name: CBC
  timeout_s: 60           # seconds per window solve
  msg: 0                  # suppress solver output

# Fleet throughput capacity.
# 8 drones × 4 missions/hour ≈ 32; with 5-km round-trip × 50 km/h flight = 12 min,
# plus 2 min loading + 3 min delivery, total ~17 min/mission, well under 15-min
# expiration window.  This headroom lets MPC's 80%-quantile hedge express above
# the point-forecast plan during peak hours.
fleet:
  C_fleet: 32
  t_avg_mission_min: 17

# Constraint settings
constraints:
  M_cover: 1              # minimum banks serving each hospital per window
  sentinel_value: -1      # used when LP is infeasible for a window

# Index sizes (for validation)
B: 3                      # number of blood banks
H: 12                     # number of hospitals
T: 24                     # number of time windows

# Average blood units consumed per delivery (used to convert inventory from
# units to effective delivery capacity in the LP).
# With units_min=1 and units_max=4, expected value = (1+4)/2 = 2.5.
avg_units_per_delivery: 2.5
